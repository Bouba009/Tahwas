<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحواس - Tahwas | اكتشف جمال الجزائر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f8fafc; overflow-x: hidden; scroll-behavior: smooth; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 4px; }

        /* --- MAP TERRAIN PATTERNS & THEMES --- */
        .map-container {
            position: relative; padding: 40px 20px; border-radius: 20px;
            overflow: hidden; min-height: 600px; margin-top: 20px;
            border: 8px solid white; box-shadow: inset 0 0 50px rgba(0,0,0,0.2), 0 10px 30px rgba(0,0,0,0.1);
        }

        /* 1. SAHARA THEME */
        .theme-sahara {
            background-color: #fef3c7;
            background-image: radial-gradient(#fbbf24 2px, transparent 2px);
            background-size: 30px 30px;
            border-color: #d97706;
        }
        .theme-sahara .map-path-line { border-left: 6px dashed #d97706; }
        .theme-sahara .map-point-dot { background: #d97706; border-color: #fff; }

        /* 2. MOUNTAIN THEME */
        .theme-mountain {
            background-color: #dcfce7;
            background-image: linear-gradient(135deg, #86efac 25%, transparent 25%), linear-gradient(225deg, #86efac 25%, transparent 25%);
            background-size: 20px 20px;
            border-color: #166534;
        }
        .theme-mountain .map-path-line { border-left: 6px dashed #15803d; }
        .theme-mountain .map-point-dot { background: #15803d; border-color: #fff; }

        /* 3. COASTAL THEME */
        .theme-coastal {
            background-color: #e0f2fe;
            background-image: radial-gradient(circle, #7dd3fc 2px, transparent 2.5px);
            background-size: 30px 30px;
            border-color: #0284c7;
        }
        .theme-coastal .map-path-line { border-left: 6px dashed #0284c7; }
        .theme-coastal .map-point-dot { background: #0284c7; border-color: #fff; }

        /* 4. HISTORICAL THEME */
        .theme-historical {
            background-color: #f5f5f4;
            background-image: repeating-linear-gradient(45deg, #e7e5e4 25%, transparent 25%, transparent 75%, #e7e5e4 75%, #e7e5e4);
            background-size: 20px 20px;
            border-color: #78716c;
        }

        /* --- MAP PATH LOGIC --- */
        .map-timeline { position: relative; max-width: 600px; margin: 0 auto; padding-bottom: 50px; }
        .map-path-line {
            position: absolute; top: 0; bottom: 0; left: 50%; width: 0; margin-left: -3px; z-index: 1;
        }
        .map-item { position: relative; margin-bottom: 80px; width: 50%; clear: both; z-index: 5; }
        .map-item:nth-child(odd) { float: left; text-align: left; padding-right: 50px; }
        .map-item:nth-child(even) { float: right; text-align: right; padding-left: 50px; }

        .map-point-dot {
            content: ''; position: absolute; top: 20px; width: 20px; height: 20px;
            border-radius: 50%; z-index: 10; border-width: 4px; border-style: solid;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            animation: pulse 2s infinite;
        }
        .map-item:nth-child(odd) .map-point-dot { right: -10px; }
        .map-item:nth-child(even) .map-point-dot { left: -10px; }

        .map-content {
            background: rgba(255, 255, 255, 0.95); padding: 15px; border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: inline-block;
            transition: transform 0.3s; position: relative;
        }
        .map-content:hover { transform: scale(1.05); }

        .deco-float { position: absolute; font-size: 3rem; animation: float 6s ease-in-out infinite; z-index: 2; opacity: 0.9; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        /* Slider in Modal */
        .modal-slider { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; height: 350px; }
        .modal-slide { min-width: 100%; height: 100%; scroll-snap-align: center; object-fit: cover; }
        
        /* Register Button Animation */
        .btn-register-pulse { animation: glowing 2s infinite; }
        @keyframes glowing { 0% { box-shadow: 0 0 5px #2563eb; } 50% { box-shadow: 0 0 20px #2563eb; } 100% { box-shadow: 0 0 5px #2563eb; } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <!-- Navbar -->
    <header class="bg-white shadow-md fixed w-full z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <h1 class="text-3xl font-black text-blue-600">تحواس<span class="text-orange-500">.</span></h1>
            <nav class="hidden md:flex gap-6 font-bold text-gray-600">
                <a href="#" onclick="location.reload()" class="hover:text-blue-600">الرئيسية</a>
                <a href="#trips-section" class="hover:text-blue-600">رحلات</a>
                <button onclick="document.getElementById('report-modal').style.display='flex'" class="text-red-500">مشكلة؟</button>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <div id="user-app" class="pt-16">
        <!-- Main Slider -->
        <div id="hero-slider" class="relative h-[400px] bg-gray-200 overflow-hidden">
             <div class="absolute inset-0 flex items-center justify-center text-gray-500"><i class="fas fa-spinner fa-spin fa-2x"></i></div>
        </div>

        <!-- Trips Grid -->
        <section id="trips-section" class="container mx-auto px-4 py-12">
            <h2 class="text-4xl font-black text-center mb-10 text-gray-800">أحدث العروض السياحية</h2>
            <div id="trips-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </section>
        
        <!-- Footer -->
        <footer class="bg-slate-900 text-white py-8 text-center mt-12 relative">
            <p>جميع الحقوق محفوظة © تحواس 2024</p>
            <!-- رابط احتياطي للأدمن -->
            <a href="#admin" onclick="forceAdminCheck()" class="text-slate-800 hover:text-slate-700 text-xs absolute bottom-2 right-2">Admin</a>
        </footer>
    </div>

    <!-- TRIP DETAILS MODAL -->
    <div id="trip-modal" class="fixed inset-0 bg-black/95 z-[60] hidden overflow-y-auto backdrop-blur-sm">
        <button onclick="closeTripModal()" class="fixed top-5 left-5 z-[70] bg-white text-red-600 rounded-full p-3 shadow-lg hover:scale-110 transition"><i class="fas fa-times fa-lg"></i></button>
        
        <div class="min-h-screen flex justify-center md:p-8 p-0">
            <div id="trip-modal-content" class="bg-white w-full max-w-6xl md:rounded-3xl shadow-2xl overflow-hidden relative animate__animated animate__fadeInUp">
                <!-- Content injected by JS -->
            </div>
        </div>
    </div>

    <!-- BOOKING MODAL -->
    <div id="booking-modal" class="fixed inset-0 bg-black/80 z-[80] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-md p-6 shadow-2xl animate__animated animate__zoomIn border-4 border-blue-500">
            <h3 class="text-2xl font-black mb-4 text-center text-blue-600">تأكيد الحجز</h3>
            <form id="booking-form" class="space-y-3">
                <input type="hidden" id="booking-trip-id">
                <input type="hidden" id="booking-trip-name">
                <input type="text" id="b-name" placeholder="الاسم واللقب" required class="w-full bg-gray-50 border p-3 rounded-lg">
                <input type="tel" id="b-phone" placeholder="رقم الهاتف" required class="w-full bg-gray-50 border p-3 rounded-lg">
                <div class="flex gap-2">
                    <input type="number" id="b-age" placeholder="السن" class="w-1/2 bg-gray-50 border p-3 rounded-lg">
                    <input type="text" id="b-state" placeholder="الولاية" class="w-1/2 bg-gray-50 border p-3 rounded-lg">
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700">سجل الآن</button>
            </form>
            <button onclick="document.getElementById('booking-modal').classList.add('hidden')" class="w-full text-center text-gray-400 mt-2 text-sm">إلغاء</button>
        </div>
    </div>

    <!-- REPORT MODAL -->
    <div id="report-modal" class="fixed inset-0 bg-black/80 z-[90] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-xl w-full max-w-md p-6">
            <h3 class="font-bold text-red-600 mb-4">الإبلاغ عن مشكلة</h3>
            <form id="report-form" class="space-y-3">
                <input id="r-name" type="text" placeholder="الاسم" class="w-full border p-2 rounded">
                <textarea id="r-desc" placeholder="الوصف..." class="w-full border p-2 rounded h-24"></textarea>
                <div class="flex gap-2">
                    <button type="submit" class="w-full bg-red-500 text-white py-2 rounded">إرسال</button>
                    <button type="button" onclick="document.getElementById('report-modal').style.display='none'" class="w-full bg-gray-200 py-2 rounded">إغلاق</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ADMIN PANEL -->
    <div id="admin-panel" class="hidden min-h-screen bg-gray-100 font-sans">
        <div id="admin-login" class="flex items-center justify-center min-h-screen bg-slate-900">
            <div class="bg-white p-8 rounded-xl shadow-2xl w-96 text-center">
                <h2 class="text-3xl font-black mb-6">لوحة الإدارة</h2>
                <input type="text" id="adm-user" placeholder="User: admin" class="w-full border p-3 rounded mb-3">
                <input type="password" id="adm-pass" placeholder="Pass: abobob123" class="w-full border p-3 rounded mb-6">
                <button onclick="loginAdmin()" class="w-full bg-blue-600 text-white font-bold py-3 rounded hover:bg-blue-700">دخول</button>
                <button onclick="location.href='index.html'" class="text-xs text-gray-400 mt-4 underline">العودة للموقع</button>
            </div>
        </div>

        <div id="admin-dashboard" class="hidden flex">
            <aside class="w-64 bg-slate-900 text-white min-h-screen fixed right-0 h-full overflow-y-auto z-10 p-4">
                <div class="text-center mb-8 border-b border-slate-700 pb-4">
                    <h2 class="text-2xl font-black">لوحة التحكم</h2>
                </div>
                <nav class="space-y-2">
                    <button onclick="showSection('stats')" class="w-full text-right p-3 hover:bg-slate-700 rounded flex gap-2"><i class="fas fa-chart-line"></i> الإحصائيات</button>
                    <button onclick="showSection('add')" class="w-full text-right p-3 hover:bg-slate-700 rounded flex gap-2"><i class="fas fa-plus"></i> إضافة رحلة</button>
                    <button onclick="showSection('manage')" class="w-full text-right p-3 hover:bg-slate-700 rounded flex gap-2"><i class="fas fa-trash"></i> حذف الرحلات</button>
                    <button onclick="showSection('banners')" class="w-full text-right p-3 hover:bg-slate-700 rounded flex gap-2"><i class="fas fa-images"></i> البانرات</button>
                    <button onclick="showSection('requests')" class="w-full text-right p-3 hover:bg-slate-700 rounded flex gap-2"><i class="fas fa-users"></i> الحجوزات</button>
                    <button onclick="logout()" class="w-full text-right p-3 text-red-400 hover:bg-slate-700 rounded mt-8"><i class="fas fa-sign-out-alt"></i> خروج</button>
                </nav>
            </aside>

            <main class="mr-64 flex-1 p-8 bg-gray-100 min-h-screen">
                <!-- Stats -->
                <div id="sec-stats" class="admin-sec">
                    <h2 class="text-3xl font-bold mb-6">الإحصائيات</h2>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
                        <div class="bg-white p-6 rounded-xl shadow border-r-4 border-blue-500">
                            <p class="text-gray-500 font-bold">زيارات اليوم</p>
                            <p class="text-4xl font-black text-blue-600 mt-2" id="stat-day">0</p>
                        </div>
                        <div class="bg-white p-6 rounded-xl shadow border-r-4 border-indigo-500">
                            <p class="text-gray-500 font-bold">زيارات الشهر</p>
                            <p class="text-4xl font-black text-indigo-600 mt-2" id="stat-month">0</p>
                        </div>
                        <div class="bg-white p-6 rounded-xl shadow border-r-4 border-green-500">
                            <p class="text-gray-500 font-bold">طلبات الحجز</p>
                            <p class="text-4xl font-black text-green-600 mt-2" id="stat-req">0</p>
                        </div>
                        <div class="bg-white p-6 rounded-xl shadow border-r-4 border-orange-500">
                            <p class="text-gray-500 font-bold">الرحلات النشطة</p>
                            <p class="text-4xl font-black text-orange-600 mt-2" id="stat-trips">0</p>
                        </div>
                    </div>
                </div>

                <!-- Add Trip -->
                <div id="sec-add" class="admin-sec hidden">
                    <h2 class="text-3xl font-bold mb-6">إضافة رحلة جديدة</h2>
                    <form id="add-trip-form" class="bg-white p-8 rounded-xl shadow-lg space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <input id="nt-title" type="text" placeholder="عنوان الرحلة" class="border p-3 rounded" required>
                            <input id="nt-price" type="number" placeholder="السعر (دج)" class="border p-3 rounded" required>
                        </div>
                        <div class="grid grid-cols-3 gap-4 bg-blue-50 p-4 rounded border border-blue-100">
                            <div><label class="text-xs font-bold">تاريخ الانطلاق</label><input id="nt-start" type="date" class="w-full border p-2 rounded"></div>
                            <div><label class="text-xs font-bold">تاريخ العودة</label><input id="nt-end" type="date" class="w-full border p-2 rounded"></div>
                            <div>
                                <label class="text-xs font-bold">وسيلة النقل</label>
                                <select id="nt-transport" class="w-full border p-2 rounded">
                                    <option value="حافلة سياحية">🚌 حافلة سياحية مريحة</option>
                                    <option value="طائرة">✈️ طائرة</option>
                                    <option value="قطار">🚆 قطار</option>
                                </select>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <select id="nt-theme" class="border p-3 rounded">
                                <option value="mountain">🏔️ جبلية (عشب وثلوج)</option>
                                <option value="sahara">🐪 صحراوية (رمال وجمال)</option>
                                <option value="coastal">🌊 ساحلية (بحر وشاطئ)</option>
                                <option value="historical">🏛️ أثرية</option>
                            </select>
                            <input id="nt-hotel" type="text" placeholder="اسم الفندق" class="border p-3 rounded">
                        </div>
                        <textarea id="nt-program" placeholder="أدخل محطات الخريطة مفصولة بفاصلة (مثال: الانطلاق، استراحة، الوصول، العشاء)" class="w-full border p-3 rounded h-24"></textarea>
                        
                        <div class="border p-4 rounded bg-gray-50">
                            <label class="font-bold block mb-2">1. الصورة الرئيسية</label>
                            <input id="nt-main-img" type="file" accept="image/*" class="w-full mb-4">
                            <label class="font-bold block mb-2">2. صور السلايدر (يمكن تحديد أكثر من صورة)</label>
                            <input id="nt-gallery" type="file" accept="image/*" multiple class="w-full">
                        </div>

                        <div class="flex gap-4">
                            <input id="nt-guide-name" type="text" placeholder="اسم المرشد" class="border p-3 rounded w-1/2">
                            <input id="nt-guide-img" type="file" class="border p-2 rounded w-1/2">
                        </div>
                        <button type="submit" class="w-full bg-green-600 text-white font-bold py-4 rounded hover:bg-green-700">نشر الرحلة</button>
                    </form>
                </div>

                <!-- Manage Trips -->
                <div id="sec-manage" class="admin-sec hidden">
                    <h2 class="text-3xl font-bold mb-6">إدارة الرحلات</h2>
                    <div id="manage-list" class="grid grid-cols-1 gap-4"></div>
                </div>

                <!-- Banners -->
                <div id="sec-banners" class="admin-sec hidden">
                    <h2 class="text-3xl font-bold mb-6">إدارة البانرات</h2>
                    <div class="flex gap-4 mb-6">
                        <input id="new-banner" type="file" class="border p-2 rounded w-full bg-white">
                        <button onclick="addBanner()" class="bg-blue-600 text-white px-6 rounded font-bold">رفع</button>
                    </div>
                    <div id="banners-list" class="grid grid-cols-1 gap-4"></div>
                </div>

                <!-- Requests -->
                <div id="sec-requests" class="admin-sec hidden">
                    <h2 class="text-3xl font-bold mb-6">الحجوزات</h2>
                    <div id="req-list" class="bg-white rounded-xl shadow overflow-hidden"></div>
                </div>
            </main>
        </div>
    </div>

    <!-- JAVASCRIPT LOGIC -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        // --- LOCAL DATABASE ---
        const DB = {
            get: (k) => JSON.parse(localStorage.getItem('th_' + k) || '[]'),
            set: (k, v) => localStorage.setItem('th_' + k, JSON.stringify(v)),
            add: (k, item) => {
                const data = DB.get(k);
                item.id = Date.now().toString();
                item.date = new Date().toISOString();
                data.push(item);
                DB.set(k, data);
            },
            del: (k, id) => {
                const data = DB.get(k);
                DB.set(k, data.filter(i => i.id !== id));
            }
        };

        const toBase64 = file => new Promise((res, rej) => {
            const r = new FileReader(); r.readAsDataURL(file);
            r.onload = () => res(r.result); r.onerror = rej;
        });

        // --- VISIT TRACKER ---
        function trackVisits() {
            if(!sessionStorage.getItem('session_active')) {
                DB.add('visits', { ts: Date.now() });
                sessionStorage.setItem('session_active', 'true');
            }
        }

        // --- PUBLIC UI ---
        function loadPublic() {
            trackVisits();
            // Banners
            const banners = DB.get('banners');
            const slider = document.getElementById('hero-slider');
            if(banners.length > 0) {
                slider.innerHTML = banners.map((b, i) => 
                    `<div class="absolute inset-0 bg-cover bg-center transition-opacity duration-1000 ${i===0?'opacity-100':'opacity-0'} slide-item" style="background-image: url('${b.img}')">
                        <div class="absolute inset-0 bg-black/30 flex items-center justify-center">
                             <h2 class="text-5xl font-black text-white drop-shadow-lg animate__animated animate__fadeInDown">اكتشف الجزائر</h2>
                        </div>
                    </div>`
                ).join('');
                let idx = 0;
                const items = document.querySelectorAll('.slide-item');
                if(items.length > 1) setInterval(() => {
                    items[idx].classList.remove('opacity-100'); items[idx].classList.add('opacity-0');
                    idx = (idx + 1) % items.length;
                    items[idx].classList.remove('opacity-0'); items[idx].classList.add('opacity-100');
                }, 4000);
            } else { slider.innerHTML = '<div class="h-full flex items-center justify-center text-gray-400">لا توجد إعلانات</div>'; }

            // Trips
            const trips = DB.get('trips');
            const grid = document.getElementById('trips-grid');
            if(trips.length === 0) grid.innerHTML = '<p class="text-center w-full col-span-3">لا توجد رحلات متاحة.</p>';
            else grid.innerHTML = trips.map(t => `
                <div class="bg-white rounded-2xl shadow hover:shadow-xl transition cursor-pointer overflow-hidden group" onclick="openTrip('${t.id}')">
                    <div class="h-60 overflow-hidden relative">
                        <img src="${t.mainImg}" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                        <span class="absolute top-3 right-3 bg-white/90 px-3 py-1 rounded-full text-sm font-bold text-blue-800">${t.price} دج</span>
                    </div>
                    <div class="p-5">
                        <h3 class="font-black text-xl mb-2 text-gray-800">${t.title}</h3>
                        <div class="flex justify-between text-xs font-bold text-gray-500 mt-4">
                            <span><i class="fas fa-calendar"></i> ${t.start}</span>
                            <span>${t.transport}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // --- TRIP MODAL LOGIC (The Scroll Fix) ---
        window.openTrip = (id) => {
            const t = DB.get('trips').find(x => x.id === id);
            if(!t) return;
            const modal = document.getElementById('trip-modal');
            const content = document.getElementById('trip-modal-content');
            modal.classList.remove('hidden');

            let themeClass = 'theme-mountain';
            let decos = [];
            if(t.theme === 'sahara') { themeClass = 'theme-sahara'; decos = ['🌴','🐪','☀️','🦂']; }
            else if(t.theme === 'coastal') { themeClass = 'theme-coastal'; decos = ['🏖️','⛵','🐬','🐚']; }
            else if(t.theme === 'historical') { themeClass = 'theme-historical'; decos = ['🏛️','🏺','📜']; }
            else { themeClass = 'theme-mountain'; decos = ['🌲','🦌','🏔️','❄️']; }

            const points = t.program ? t.program.split(',') : [];
            const mapHTML = points.map((p, i) => {
                const deco = decos[i % decos.length];
                return `
                <div class="map-item">
                    <div class="map-point-dot"></div>
                    <div class="map-content">
                        <h4 class="font-bold text-lg">${p}</h4>
                        <span class="text-xs text-gray-500">${i===0?'البداية':(i===points.length-1?'النهاية':'محطة')}</span>
                    </div>
                    <div class="deco-float" style="${i%2===0 ? 'left:-60px' : 'right:-60px'}; top: -20px;">${deco}</div>
                </div>`;
            }).join('');

            let sliderHTML = `<img src="${t.mainImg}" class="modal-slide">`;
            if(t.gallery && t.gallery.length > 0) {
                sliderHTML = t.gallery.map(img => `<img src="${img}" class="modal-slide">`).join('');
            }

            content.innerHTML = `
                <div class="flex flex-col md:flex-row h-full md:h-[80vh]">
                    <!-- Image Slider -->
                    <div class="w-full md:w-1/3 bg-black relative h-64 md:h-full">
                        <div class="modal-slider h-full">${sliderHTML}</div>
                        <div class="absolute bottom-0 inset-x-0 p-6 bg-gradient-to-t from-black to-transparent text-white">
                            <h2 class="text-3xl font-black">${t.title}</h2>
                            <p class="text-xl text-yellow-400 font-bold">${t.price} دج</p>
                        </div>
                    </div>
                    
                    <!-- Scrollable Content -->
                    <div class="w-full md:w-2/3 bg-gray-50 overflow-y-auto relative h-full">
                        <div class="p-6">
                            <div class="grid grid-cols-2 md:grid-cols-4 gap-2 mb-6 text-sm">
                                <div class="bg-blue-100 p-2 rounded text-blue-800 font-bold text-center"><i class="fas fa-calendar-alt block"></i> ${t.start}</div>
                                <div class="bg-blue-100 p-2 rounded text-blue-800 font-bold text-center"><i class="fas fa-calendar-check block"></i> ${t.end}</div>
                                <div class="bg-orange-100 p-2 rounded text-orange-800 font-bold text-center"><i class="fas fa-bus block"></i> ${t.transport}</div>
                                <div class="bg-green-100 p-2 rounded text-green-800 font-bold text-center"><i class="fas fa-shield-alt block"></i> تأمين</div>
                            </div>

                            <div class="map-container ${themeClass}">
                                <h3 class="text-center font-bold text-black/50 mb-8"><i class="fas fa-map-marked-alt"></i> مرر للأسفل لرؤية البرنامج</h3>
                                <div class="map-timeline">
                                    <div class="map-path-line"></div>
                                    ${mapHTML}
                                </div>
                            </div>

                            <!-- Register Button at BOTTOM -->
                            <div class="mt-8 mb-4 text-center">
                                 <p class="text-sm text-gray-500 mb-2">هل أعجبك البرنامج؟</p>
                                 <button onclick="openBooking('${t.id}', '${t.title}')" class="btn-register-pulse w-full md:w-auto px-12 py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-full shadow-lg text-xl">
                                    سجل في هذه الرحلة الآن
                                 </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        };
        window.closeTripModal = () => document.getElementById('trip-modal').classList.add('hidden');

        // Booking
        window.openBooking = (id, title) => {
            document.getElementById('booking-trip-id').value = id;
            document.getElementById('booking-trip-name').value = title;
            document.getElementById('booking-modal').classList.remove('hidden');
        };
        document.getElementById('booking-form').addEventListener('submit', (e) => {
            e.preventDefault();
            DB.add('requests', {
                name: document.getElementById('b-name').value,
                phone: document.getElementById('b-phone').value,
                age: document.getElementById('b-age').value,
                state: document.getElementById('b-state').value,
                trip: document.getElementById('booking-trip-name').value,
                status: 'جديد'
            });
            document.getElementById('booking-modal').classList.add('hidden');
            Swal.fire('تم!', 'سنتصل بك قريباً', 'success');
        });

        // --- ADMIN LOGIC (FIXED) ---
        function checkAdminUrl() {
            if(window.location.hash === '#admin' || window.location.hash === '#admin1') {
                document.getElementById('user-app').classList.add('hidden');
                document.getElementById('admin-panel').classList.remove('hidden');
            }
        }
        window.addEventListener('load', checkAdminUrl);
        window.addEventListener('hashchange', checkAdminUrl);
        
        // Force button
        window.forceAdminCheck = () => { window.location.hash = '#admin'; location.reload(); };

        window.loginAdmin = () => {
            const u = document.getElementById('adm-user').value;
            const p = document.getElementById('adm-pass').value;
            if(u === 'admin' && p === 'abobob123') {
                document.getElementById('admin-login').classList.add('hidden');
                document.getElementById('admin-dashboard').classList.remove('hidden');
                document.getElementById('admin-dashboard').classList.add('flex');
                updateStats();
            } else { Swal.fire('خطأ', 'بيانات خاطئة', 'error'); }
        }
        window.logout = () => { window.location.hash = ''; window.location.reload(); };

        window.showSection = (id) => {
            document.querySelectorAll('.admin-sec').forEach(d => d.classList.add('hidden'));
            document.getElementById('sec-'+id).classList.remove('hidden');
            if(id === 'manage') renderManageTrips();
            if(id === 'banners') renderManageBanners();
            if(id === 'requests') renderRequests();
            if(id === 'stats') updateStats();
        }

        // Add Trip
        document.getElementById('add-trip-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button'); btn.innerText = 'جاري الرفع...'; btn.disabled = true;

            try {
                const mainFile = document.getElementById('nt-main-img').files[0];
                const mainImg = mainFile ? await toBase64(mainFile) : '';
                
                const galleryFiles = document.getElementById('nt-gallery').files;
                let galleryImgs = [];
                if(galleryFiles.length > 0) {
                    for(let i=0; i<galleryFiles.length; i++) galleryImgs.push(await toBase64(galleryFiles[i]));
                }
                if(mainImg) galleryImgs.unshift(mainImg);

                const guideFile = document.getElementById('nt-guide-img').files[0];
                const guideImg = guideFile ? await toBase64(guideFile) : '';

                DB.add('trips', {
                    title: document.getElementById('nt-title').value,
                    price: document.getElementById('nt-price').value,
                    start: document.getElementById('nt-start').value,
                    end: document.getElementById('nt-end').value,
                    transport: document.getElementById('nt-transport').value,
                    theme: document.getElementById('nt-theme').value,
                    hotel: document.getElementById('nt-hotel').value,
                    program: document.getElementById('nt-program').value,
                    mainImg: mainImg,
                    gallery: galleryImgs,
                    guideName: document.getElementById('nt-guide-name').value,
                    guideImg: guideImg
                });

                Swal.fire('نجاح', 'تمت إضافة الرحلة', 'success');
                e.target.reset();
            } catch(err) { alert('خطأ: حجم الصور كبير'); }
            btn.innerText = 'نشر الرحلة'; btn.disabled = false;
        });

        // Manage Logic
        function renderManageTrips() {
            const list = document.getElementById('manage-list');
            list.innerHTML = DB.get('trips').map(t => `
                <div class="bg-white p-4 rounded shadow flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <img src="${t.mainImg}" class="w-16 h-16 object-cover rounded">
                        <div><h4 class="font-bold">${t.title}</h4></div>
                    </div>
                    <button onclick="if(confirm('حذف؟')) { DB.del('trips', '${t.id}'); renderManageTrips(); }" class="bg-red-100 text-red-600 px-3 py-1 rounded">حذف</button>
                </div>
            `).join('');
        }
        function renderManageBanners() {
            const list = document.getElementById('banners-list');
            list.innerHTML = DB.get('banners').map(b => `
                <div class="relative group"><img src="${b.img}" class="w-full h-24 object-cover rounded"><button onclick="DB.del('banners', '${b.id}'); renderManageBanners();" class="absolute top-1 right-1 bg-red-600 text-white px-2 rounded">X</button></div>
            `).join('');
        }
        async function addBanner() {
            const f = document.getElementById('new-banner').files[0];
            if(f) { const img = await toBase64(f); DB.add('banners', { img }); renderManageBanners(); }
        }
        function renderRequests() {
            const list = document.getElementById('req-list');
            list.innerHTML = DB.get('requests').map(r => `
                <div class="p-4 border-b flex justify-between items-center hover:bg-gray-50">
                    <div><h4 class="font-bold">${r.name}</h4><p class="text-sm text-blue-600">${r.phone}</p><p class="text-xs text-gray-500">${r.trip}</p></div>
                    <span class="bg-yellow-100 text-yellow-800 text-xs px-2 py-1 rounded">${r.status}</span>
                </div>
            `).join('');
        }
        function updateStats() {
            const visits = DB.get('visits');
            const now = new Date();
            const startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
            const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1).getTime();
            document.getElementById('stat-day').innerText = visits.filter(v => v.ts >= startOfDay).length;
            document.getElementById('stat-month').innerText = visits.filter(v => v.ts >= startOfMonth).length;
            document.getElementById('stat-req').innerText = DB.get('requests').length;
            document.getElementById('stat-trips').innerText = DB.get('trips').length;
        }

        loadPublic();
    </script>
</body>
</html>
